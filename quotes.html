<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时行情 - FinView | 外汇 贵金属 原油 加密货币报价</title>
  <meta name="description" content="查看外汇、贵金属、能源、加密货币实时行情报价，支持K线图、多周期切换、自选管理。">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/quotes.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="site-logo"><div class="logo-icon">FV</div><span>FinView</span></a>
      <nav class="main-nav">
        <a href="/" class="nav-link" data-page="home">首页</a>
        <a href="/quotes.html" class="nav-link active" data-page="quotes">行情</a>
        <a href="/news.html" class="nav-link" data-page="news">新闻</a>
        <a href="/calendar.html" class="nav-link" data-page="calendar">财经日历</a>
        <a href="/tools.html" class="nav-link" data-page="tools">交易工具</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Switch theme">☽</button>
        <button class="mobile-menu-btn" aria-label="Open menu"><div class="hamburger"><span></span><span></span><span></span></div></button>
      </div>
    </div>
  </header>

  <div class="mobile-nav-overlay">
    <nav class="mobile-nav">
      <button class="mobile-nav-close" aria-label="Close menu">✕</button>
      <div class="mobile-nav-links">
        <a href="/" class="nav-link">首页</a>
        <a href="/quotes.html" class="nav-link active">行情</a>
        <a href="/news.html" class="nav-link">新闻</a>
        <a href="/calendar.html" class="nav-link">财经日历</a>
        <a href="/tools.html" class="nav-link">交易工具</a>
        <a href="/about.html" class="nav-link">关于我们</a>
      </div>
    </nav>
  </div>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">实时行情</h1>
        <p class="page-description">外汇 · 贵金属 · 能源 · 加密货币实时报价与图表分析</p>
      </div>

      <!-- Category Tabs -->
      <div class="tabs" id="categoryTabs">
        <button class="tab active" data-category="all">全部</button>
        <button class="tab" data-category="forex">外汇</button>
        <button class="tab" data-category="metal">贵金属</button>
        <button class="tab" data-category="energy">能源</button>
        <button class="tab" data-category="crypto">数字货币</button>
        <button class="tab" data-category="watchlist">我的自选</button>
      </div>

      <!-- Period Selector for Chart -->
      <div class="chart-controls" id="chartControls">
        <select class="form-select" id="symbolSelect" style="width:auto;min-width:140px;">
          <option value="XAUUSD">黄金 XAU/USD</option>
          <option value="XAGUSD">白银 XAG/USD</option>
          <option value="WTI">美原油 WTI</option>
          <option value="BRENT">布伦特原油</option>
          <option value="BTC">比特币 BTC</option>
          <option value="ETH">以太坊 ETH</option>
          <option value="EURUSD">欧元/美元</option>
          <option value="GBPUSD">英镑/美元</option>
          <option value="USDJPY">美元/日元</option>
        </select>
        <div class="period-btns" id="periodBtns">
          <button class="period-btn" data-period="1m">1分</button>
          <button class="period-btn" data-period="5m">5分</button>
          <button class="period-btn" data-period="15m">15分</button>
          <button class="period-btn active" data-period="1h">1时</button>
          <button class="period-btn" data-period="4h">4时</button>
          <button class="period-btn" data-period="1d">日线</button>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-container" id="mainChart"></div>

      <!-- Ad -->
      <div class="ad-placeholder ad-banner">广告位 728x90</div>

      <!-- Quotes Grid -->
      <div class="quote-grid" id="quotesGrid"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 FinView. All rights reserved.</p>
        <p>市场数据仅供参考，不构成投资建议。</p>
      </div>
    </div>
  </footer>

  <script type="module">
    import { init as initTheme } from '/js/theme.js';
    import { initMobileMenu, setActiveNav, getUrlParam } from '/js/utils.js';
    import { fetchAllPrices, formatQuote, fetchKlineData, INSTRUMENTS } from '/js/api.js';
    import { renderQuotes, updateQuotes, startAutoRefresh, getSymbolsByCategory } from '/js/quotes.js';
    import { createKlineChart, updateChartData, resizeChart } from '/js/charts.js';

    initTheme();
    initMobileMenu();
    setActiveNav('quotes');

    let chartInstance = null;
    let currentSymbol = getUrlParam('symbol') || 'XAUUSD';
    let currentPeriod = '1h';

    // Category tabs
    document.getElementById('categoryTabs').addEventListener('click', (e) => {
      if (!e.target.classList.contains('tab')) return;
      document.querySelectorAll('#categoryTabs .tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      loadQuotes(e.target.dataset.category);
    });

    // Symbol select
    document.getElementById('symbolSelect').addEventListener('change', (e) => {
      currentSymbol = e.target.value;
      loadChart();
    });

    // Period buttons
    document.getElementById('periodBtns').addEventListener('click', (e) => {
      if (!e.target.classList.contains('period-btn')) return;
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentPeriod = e.target.dataset.period;
      loadChart();
    });

    async function loadQuotes(category) {
      const symbols = category === 'watchlist' ? (JSON.parse(localStorage.getItem('fp_watchlist') || '[]')) : getSymbolsByCategory(category);
      const data = await fetchAllPrices();
      renderQuotes('quotesGrid', symbols, data);
    }

    async function loadChart() {
      const container = document.getElementById('mainChart');
      if (chartInstance) {
        chartInstance.chart.remove();
      }
      const theme = document.documentElement.getAttribute('data-theme');
      chartInstance = createKlineChart(container, { width: container.clientWidth, height: 400, theme });
      const klineData = await fetchKlineData(currentSymbol, currentPeriod);
      updateChartData(chartInstance, klineData);
    }

    // Initialize
    loadQuotes('all');
    loadChart();
    startAutoRefresh(30000);

    // Resize chart on window resize
    window.addEventListener('resize', () => {
      if (chartInstance) resizeChart(chartInstance);
    });
  </script>
</body>
</html>
