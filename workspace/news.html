<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财经新闻 - FinView | 全球金融市场资讯</title>
  <meta name="description" content="全球财经新闻快讯，涵盖外汇、贵金属、能源、加密货币市场动态。">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/news.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="site-logo"><div class="logo-icon">FV</div><span>FinView</span></a>
      <nav class="main-nav">
        <a href="/" class="nav-link" data-page="home">首页</a>
        <a href="/quotes.html" class="nav-link" data-page="quotes">行情</a>
        <a href="/news.html" class="nav-link active" data-page="news">新闻</a>
        <a href="/calendar.html" class="nav-link" data-page="calendar">财经日历</a>
        <a href="/tools.html" class="nav-link" data-page="tools">交易工具</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Switch theme">☽</button>
        <button class="mobile-menu-btn" aria-label="Open menu"><div class="hamburger"><span></span><span></span><span></span></div></button>
      </div>
    </div>
  </header>

  <div class="mobile-nav-overlay">
    <nav class="mobile-nav">
      <button class="mobile-nav-close" aria-label="Close menu">✕</button>
      <div class="mobile-nav-links">
        <a href="/" class="nav-link">首页</a>
        <a href="/quotes.html" class="nav-link">行情</a>
        <a href="/news.html" class="nav-link active">新闻</a>
        <a href="/calendar.html" class="nav-link">财经日历</a>
        <a href="/tools.html" class="nav-link">交易工具</a>
        <a href="/about.html" class="nav-link">关于我们</a>
      </div>
    </nav>
  </div>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">财经新闻</h1>
        <p class="page-description">全球金融市场实时资讯与深度分析</p>
      </div>

      <!-- Category Filter -->
      <div class="news-filters">
        <button class="filter-btn active" data-cat="all">全部</button>
        <button class="filter-btn" data-cat="forex">外汇</button>
        <button class="filter-btn" data-cat="metal">贵金属</button>
        <button class="filter-btn" data-cat="energy">能源</button>
        <button class="filter-btn" data-cat="crypto">加密货币</button>
        <button class="filter-btn" data-cat="macro">宏观经济</button>
      </div>

      <!-- Ad -->
      <div class="ad-placeholder ad-banner">广告位 728x90</div>

      <!-- News List -->
      <div class="news-list" id="newsList">
        <div class="loading">
          <div class="skeleton" style="height:80px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:80px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:80px;margin-bottom:12px;"></div>
        </div>
      </div>

      <!-- Load More -->
      <div class="load-more">
        <button class="btn btn-secondary" id="loadMoreBtn">加载更多</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 FinView. All rights reserved.</p>
        <p>市场数据仅供参考，不构成投资建议。</p>
      </div>
    </div>
  </footer>

  <script type="module">
    import { init as initTheme } from '/js/theme.js';
    import { initMobileMenu, setActiveNav } from '/js/utils.js';
    import { fetchNews } from '/js/api.js';

    initTheme();
    initMobileMenu();
    setActiveNav('news');

    let allNews = [];
    let displayedCount = 0;
    const pageSize = 10;

    // Category filter
    document.querySelector('.news-filters').addEventListener('click', (e) => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.news-filters .filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      displayedCount = 0;
      renderNews(e.target.dataset.cat);
    });

    // Load more
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      displayedCount += pageSize;
      const activeCat = document.querySelector('.news-filters .filter-btn.active').dataset.cat;
      renderNews(activeCat);
    });

    async function loadNews() {
      allNews = await fetchNews(50);
      displayedCount = pageSize;
      renderNews('all');
    }

    function renderNews(category) {
      const container = document.getElementById('newsList');
      const filtered = category === 'all' ? allNews : filterByCategory(allNews, category);
      const items = filtered.slice(0, displayedCount);

      if (!items.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><div class="empty-state-text">暂无相关新闻</div></div>';
        return;
      }

      container.innerHTML = items.map(item => `
        <a href="${item.url}" target="_blank" rel="noopener" class="news-card">
          ${item.image ? `<div class="news-image"><img src="${item.image}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : ''}
          <div class="news-content">
            <div class="news-title">${item.title}</div>
            ${item.description ? `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${item.description}</p>` : ''}
            <div class="news-meta">
              <span class="news-source">${item.source}</span>
              <span>${item.publishedAt ? new Date(item.publishedAt).toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</span>
            </div>
          </div>
        </a>
      `).join('');

      // Hide load more if all displayed
      document.getElementById('loadMoreBtn').style.display = displayedCount >= filtered.length ? 'none' : '';
    }

    function filterByCategory(news, cat) {
      const keywords = {
        forex: ['forex','euro','pound','yen','dollar','currency','EUR','GBP','JPY'],
        metal: ['gold','silver','platinum','precious metal','XAU','XAG'],
        energy: ['oil','crude','WTI','brent','energy','OPEC'],
        crypto: ['bitcoin','ethereum','crypto','BTC','ETH'],
        macro: ['GDP','inflation','CPI','interest rate','Fed','ECB','central bank','economic'],
      };
      const kws = keywords[cat] || [];
      return news.filter(n => {
        const text = (n.title + ' ' + n.description).toLowerCase();
        return kws.some(kw => text.includes(kw.toLowerCase()));
      });
    }

    loadNews();
  </script>
</body>
</html>
